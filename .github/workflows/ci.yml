name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpp:
    name: C++ build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y clang make

      - name: Build and test
        run: make test

  bindings:
    name: Native bindings build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bindings/node/package-lock.json

      - name: Install native build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential clang make

      - name: Build C++ sim
        run: make -j$(nproc)

      - name: Build and test native addon
        working-directory: bindings/node
        run: npm ci && npm run build && npm test

  server:
    name: Server build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            bindings/node/package-lock.json
            server/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install native build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential clang make

      - name: Build native addon
        working-directory: bindings/node
        run: npm ci && npm run build && npm test

      - name: Build and test server
        working-directory: server
        run: npm ci && npm run build && npm test

  viewer:
    name: Viewer build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: viewer/package-lock.json

      - name: Build and test viewer
        working-directory: viewer
        run: npm ci && npm run test
