    <<: *assembly_sprite
    slot: rear_aero
    z: 30
    socket: { x: 0.7, y: 0.02, w: 0.3, h: 0.62 }
    prompt: |
      {style}
      Isolated sprite of ONLY: {part_desc}
      Side view, white background.

  - id: rear_aero.WinglessGroundEffect
    category: rear_aero
    part_id: WinglessGroundEffect
    <<: *assembly_sprite
    slot: rear_floor
    z: 18
    socket: { x: 0.68, y: 0.62, w: 0.3, h: 0.28 }
    prompt: |
      {style}
      Isolated sprite of ONLY: {part_desc}
      Side view, white background.

  - id: wheel_package.Hypercar18Standard
    category: wheel_package
    part_id: Hypercar18Standard
    width: 768
    height: 256
    aspect_ratio: "16:9"
    remove_background: true
    normalize: sprite
    layer_type: sprite
    compatible_chassis: [LMDhDallara]
    slot: wheel_package
    z: 12
    socket: { x: 0.12, y: 0.68, w: 0.76, h: 0.32 }
    prompt: |
      {style}
      Isolated sprite of ONLY two racing wheel+tire assemblies in side view (balanced standard width),
      spaced for LMDh wheelbase. White background. No car body.
      {part_desc}

  - id: wheel_package.Hypercar18WideRear
    category: wheel_package
    part_id: Hypercar18WideRear
    width: 768
    height: 256
    aspect_ratio: "16:9"
    remove_background: true
    normalize: sprite
    layer_type: sprite
    compatible_chassis: [LMDhDallara]
    slot: wheel_package
    z: 12
