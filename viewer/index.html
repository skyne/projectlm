<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProjectLM · FIA WEC Endurance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@500;700&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="/src/game-theme.css" />
  </head>
  <body>
    <div id="mock-mode-banner" class="mock-mode-banner hidden" role="alert" aria-live="polite">
      <strong>MOCK SIM ACTIVE</strong>
      <span>— TypeScript physics fallback. Tyre/weather behaviour is approximate, not the real C++ race sim.</span>
    </div>
    <div id="app">
      <header class="header header-wec">
        <div class="header-brand">
          <div class="wec-chequer" aria-hidden="true"></div>
          <div class="header-titles">
            <span class="header-series">FIA World Endurance Championship</span>
            <h1>ProjectLM</h1>
          </div>
        </div>
        <div id="header-nav"></div>
        <div class="header-status-wrap">
          <div id="audio-controls-container"></div>
          <div id="session-roster-container" class="header-roster-slot"></div>
          <span class="header-endurance-tag">24H · 6H · 12H</span>
          <span id="session-type-badge" class="session-type-badge hidden">Race</span>
          <span id="race-lap-counter" class="race-lap-counter hidden">Lap —</span>
          <span id="status" class="status">Connecting…</span>
          <button type="button" id="change-identity-btn" class="change-identity-btn hidden" title="Change display name or role">Identity</button>
        </div>
        <div class="header-racing-stripe" aria-hidden="true"></div>
      </header>
      <main class="layout">
        <div id="compact-leaderboard-container" class="compact-lb-column hidden"></div>
        <div class="main-content">
          <section class="main-panel season-panel" id="race-hub-container"></section>
          <section class="main-panel calendar-panel hidden" id="calendar-container"></section>
          <section class="main-panel track-panel hidden" id="map-panel">
            <div class="track-panel-bar">
              <span class="mm-badge mm-badge-live hidden" id="live-badge">Session Live</span>
            </div>
            <div id="track-container"></div>
          </section>
          <section class="main-panel timetable-panel hidden" id="timetable-container"></section>
          <section class="main-panel telemetry-panel-host hidden" id="telemetry-container"></section>
          <section class="main-panel team-panel hidden" id="team-container"></section>
          <section class="main-panel garage-panel hidden" id="garage-container"></section>
          <section class="main-panel drivers-panel hidden" id="drivers-container"></section>
        </div>
        <aside class="sidebar sidebar-wec hidden">
          <div class="sidebar-brand">
            <span class="sidebar-brand-label">Race Control</span>
          </div>
          <div id="car-preview-container"></div>
          <div id="race-controls-container"></div>
          <div id="weather-radar-container"></div>
          <div id="weather-forecast-container"></div>
          <div id="pitwall-container"></div>
          <div id="engineer-container"></div>
          <div id="event-log-container"></div>
          <div id="playback-container"></div>
        </aside>
      </main>
    </div>
    <div id="team-wizard-overlay"></div>
    <div id="join-session-overlay"></div>
    <div id="confirm-modal-overlay"></div>
    <div id="pit-stop-modal"></div>
    <div id="post-race-overlay" class="post-race-overlay hidden"></div>
    <div id="pre-session-overlay"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
